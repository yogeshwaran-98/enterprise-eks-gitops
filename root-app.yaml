apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: enterprise-root
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/yogeshwaran-98/enterprise-eks-gitops.git
    targetRevision: main
    path: apps

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
