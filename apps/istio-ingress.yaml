apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: istio-ingress
  namespace: argocd

spec:
  project: default

  sources:
    - repoURL: https://istio-release.storage.googleapis.com/charts
      chart: gateway
      targetRevision: 1.28.0

      helm:
        valueFiles:
          - $values/environments/production/istio-ingress-values.yaml

    - repoURL: https://github.com/yogeshwaran-98/enterprise-eks-gitops.git
      targetRevision: main
      ref: values

  destination:
    server: https://kubernetes.default.svc
    namespace: istio-system

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true
