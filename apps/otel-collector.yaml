apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: otel-collector
  namespace: argocd

spec:
  project: default

  sources:
    - repoURL: https://open-telemetry.github.io/opentelemetry-helm-charts
      chart: opentelemetry-operator
      targetRevision: 0.91.1

      helm:
        valueFiles:
          - $values/environments/production/otel-values.yaml

    - repoURL: https://github.com/yogeshwaran-98/enterprise-eks-gitops.git
      targetRevision: main
      ref: values

  destination:
    server: https://kubernetes.default.svc
    namespace: observability

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true
